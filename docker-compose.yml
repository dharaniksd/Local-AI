networks:
  local-ai:
    driver: bridge

services:

  # -------------------------
  # 🧠 Ollama (Local LLM)
  # -------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks:
      - local-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    restart: unless-stopped

  # -------------------------
  # 💬 Open WebUI (Chat UI)
  # -------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    networks:
      - local-ai
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - ENABLE_SEARCH=true
      - SEARXNG_BASE_URL=http://searxng:8081
      - RAG_TOP_K=10
      - RAG_RELEVANCE_THRESHOLD=0.3
      - PDF_EXTRACT_IMAGES=true
    depends_on:
      - ollama
      - searxng
    volumes:
      - openwebui_data:/app/backend/data
    restart: unless-stopped

  # -------------------------
  # 🌐 SearXNG (Web Search)
  # -------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    networks:
      - local-ai
    ports:
      - "8081:8080"
    environment:
      - BASE_URL=http://localhost:8081/
      - INSTANCE_NAME=Local-AI-Search
      - ENABLE_METRICS=false
      - AUTOCOMPLETE=google
      - RESULTS_ON_NEW_TAB=true
    restart: unless-stopped

  # -------------------------
  # 🎨 Stable Diffusion WebUI (ComfyUI) - Image Generation (OPTIONAL - Disabled)
  # -------------------------
  # To enable: uncomment below and run: docker-compose up -d stable-diffusion-webui
  # Note: Requires downloading models first (see README.md)
  # stable-diffusion-webui:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.sd
  #   container_name: stable-diffusion-webui
  #   networks:
  #     - local-ai
  #   ports:
  #     - "8188:8188"
  #   volumes:
  #     - sd_models:/app/models
  #     - sd_outputs:/app/output
  #   restart: unless-stopped
  #   environment:
  #     - TORCH_DEVICE=cpu
  #     - TORCH_BACKEND=upsample
  #     - COMFYUI_FORCE_CPU=true
  #     - CUDA_VISIBLE_DEVICES=

volumes:
  ollama_data:
  openwebui_data:
  sd_models:
  sd_outputs: